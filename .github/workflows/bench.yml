name: Performance Verification Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  profile:
    name: Run Benchmark Suite
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.fsproj
            **/Directory.Build.props

      - name: Restore Dependencies
        run: dotnet restore Jerkball2D.MatchTimer.Benchmarks.csproj
        working-directory: src/Diagnostics/Jerkball2D.MatchTimer.Benchmarks

      - name: Execute Performance Verification (net8.0)
        run: dotnet run -c Release -f net8.0 --no-restore -- --exporters json markdown --filter '*'
        working-directory: src/Diagnostics/Jerkball2D.MatchTimer.Benchmarks

      - name: Upload Performance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports-${{ github.sha }}
          path: src/Diagnostics/Jerkball2D.MatchTimer.Benchmarks/BenchmarkDotNet.Artifacts/results/
          if-no-files-found: warn
          retention-days: 14
