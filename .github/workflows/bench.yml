name: Performance Verification Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  profile:
    name: Run Benchmark Suite
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          # Provisions .NET 10 for build tooling while ensuring the .NET 8 runtime is present for execution
          dotnet-version: |
            8.0.x
            10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.fsproj
            **/Directory.Build.props

      - name: Restore dependencies
        run: dotnet restore Jerkball2D.MatchTimer.Benchmarks.csproj
        working-directory: src/Diagnostics/Jerkball2D.MatchTimer.Benchmarks

      - name: Run benchmarks
        run: dotnet run -c Release -f net8.0 --no-restore -- --exporters json markdown --filter '*'
        working-directory: src/Diagnostics/Jerkball2D.MatchTimer.Benchmarks

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-reports-${{ github.sha }}
          path: src/Diagnostics/Jerkball2D.MatchTimer.Benchmarks/BenchmarkDotNet.Artifacts/results/
          if-no-files-found: warn
          retention-days: 14
